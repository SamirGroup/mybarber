{% extends 'base.html' %}

{% block title %}Delete Service{% endblock %}

{% block page_title %}Delete Service{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <div class="alert alert-danger">
            <h4><i class="fas fa-exclamation-triangle"></i> Warning!</h4>
            <p>Are you sure you want to delete service "{{ service.name }}"?</p>
            <p>This action cannot be undone.</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'service_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
