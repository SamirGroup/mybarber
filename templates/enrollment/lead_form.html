{% extends 'base.html' %}

{% block content %}
<h1 style="font-size:28px;margin-bottom:24px;">📋 Yangi lead qo'shish</h1>

<div class="card" style="max-width:700px;background:#fffdf7;border:1px solid #e2d9cf;border-radius:16px;padding:24px;">
  <form method="post">
    {% csrf_token %}
    <h3 style="margin-bottom:16px;"><i class="fa-solid fa-user" style="color:#D4A373;"></i> Ota-ona ma'lumotlari</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Ism <span style="color:#dc3545;">*</span></label>
        <input type="text" name="first_name" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Familiya <span style="color:#dc3545;">*</span></label>
        <input type="text" name="last_name" class="form-control" required>
      </div>
    </div>
    <div class="form-group">
      <label>Telefon <span style="color:#dc3545;">*</span></label>
      <input type="tel" name="phone" class="form-control" placeholder="+998 90 000 00 00" pattern="\+998[0-9]{9}" required>
      <small style="color:#666;">O'zbekiston: +99890xxxxxxx</small>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" class="form-control">
    </div>
    
    <h3 style="margin:24px 0 16px;"><i class="fa-solid fa-child" style="color:#D4A373;"></i> Bolaning ma'lumotlari</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Bolaning ismi</label>
        <input type="text" name="child_name" class="form-control">
      </div>
      <div class="form-group">
        <label>Bolaning yoshi</label>
        <input type="number" name="child_age" class="form-control" min="0" max="25">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Qiziqish sinfi</label>
        <select name="grade" class="form-control">
          <option value="">— Tanlang —</option>
          {% for g in grades %}
          <option value="{{ g.id }}">{{ g.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Manba <span style="color:#dc3545;">*</span></label>
        <select name="source" class="form-control" required>
          <option value="">— Tanlang —</option>
          {% for s in sources %}
          <option value="{{ s.id }}">{{ s.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Eslatmalar</label>
      <textarea name="notes" class="form-control" rows="3"></textarea>
    </div>
    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Saqlash</button>
    <a href="{% url 'enrollment_lead_list' %}" class="btn" style="margin-left:8px;">Bekor qilish</a>
  </form>
</div>
{% endblock %}
