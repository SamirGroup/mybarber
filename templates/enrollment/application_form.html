{% extends 'base.html' %}

{% block content %}
<h1 style="font-size:28px;margin-bottom:24px;">📄 {% if lead %}Lead'dan ariza: {{ lead.full_name }}{% else %}Yangi ariza{% endif %}</h1>

<div class="card" style="max-width:800px;background:#fffdf7;border:1px solid #e2d9cf;border-radius:16px;padding:24px;">
  <form method="post">
    {% csrf_token %}
    <h3 style="margin-bottom:16px;"><i class="fa-solid fa-user-group" style="color:#D4A373;"></i> Ota-ona ma'lumotlari</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Ism <span style="color:#dc3545;">*</span></label>
        <input type="text" name="parent_first_name" class="form-control" value="{{ initial.parent_first_name|default:'' }}" required>
      </div>
      <div class="form-group">
        <label>Familiya <span style="color:#dc3545;">*</span></label>
        <input type="text" name="parent_last_name" class="form-control" value="{{ initial.parent_last_name|default:'' }}" required>
      </div>
    </div>
    <div class="form-group">
      <label>Telefon <span style="color:#dc3545;">*</span></label>
      <input type="tel" name="parent_phone" class="form-control" value="{{ initial.parent_phone|default:'' }}" placeholder="+998 90 000 00 00" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="parent_email" class="form-control" value="{{ initial.parent_email|default:'' }}">
    </div>
    <div class="form-group">
      <label>Aloqa (Ota/Ona/Vasiy) <span style="color:#dc3545;">*</span></label>
      <input type="text" name="parent_relation" class="form-control" value="Ota" required>
    </div>

    <h3 style="margin:24px 0 16px;"><i class="fa-solid fa-user-graduate" style="color:#D4A373;"></i> O'quvchi ma'lumotlari</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Ism <span style="color:#dc3545;">*</span></label>
        <input type="text" name="student_first_name" class="form-control" value="{{ initial.student_first_name|default:'' }}" required>
      </div>
      <div class="form-group">
        <label>Familiya <span style="color:#dc3545;">*</span></label>
        <input type="text" name="student_last_name" class="form-control" value="{{ initial.student_last_name|default:'' }}" required>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Tug'ilgan sana <span style="color:#dc3545;">*</span></label>
        <input type="date" name="student_dob" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Jins <span style="color:#dc3545;">*</span></label>
        <select name="student_gender" class="form-control">
          <option value="M">O'g'il</option>
          <option value="F">Qiz</option>
        </select>
      </div>
      <div class="form-group">
        <label>Ariza sinfi</label>
        <select name="grade" class="form-control">
          <option value="">— Tanlang —</option>
          {% for g in grades %}
          <option value="{{ g.id }}" {% if initial.applying_grade == g %}selected{% endif %}>{{ g.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Oldingi maktab</label>
      <input type="text" name="previous_school" class="form-control">
    </div>
    <div class="form-group">
      <label>Tibbiy eslatmalar</label>
      <textarea name="medical_notes" class="form-control" rows="2"></textarea>
    </div>
    <div class="form-group">
      <label>Eslatmalar</label>
      <textarea name="notes" class="form-control" rows="2"></textarea>
    </div>
    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> Topshirish</button>
    <a href="{% url 'enrollment_application_list' %}" class="btn" style="margin-left:8px;">Bekor qilish</a>
  </form>
</div>
{% endblock %}
