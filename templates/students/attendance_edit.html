{% extends 'base.html' %}
{% block breadcrumb %}Davomat tahrirlash{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header fw-bold">
        <i class="fa-solid fa-pen-to-square me-2"></i>Davomatni tahrirlash
      </div>
      <div class="card-body">
        <p class="text-muted mb-3" style="font-size:13px;">
          O'quvchi: <strong>{{ attendance.student }}</strong> |
          Sana: <strong>{{ attendance.date }}</strong>
        </p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Holat</label>
            <select name="status" class="form-select" required>
              <option value="present" {% if attendance.status == 'present' %}selected{% endif %}>Keldi</option>
              <option value="absent" {% if attendance.status == 'absent' %}selected{% endif %}>Kelmadi</option>
              <option value="late" {% if attendance.status == 'late' %}selected{% endif %}>Kech keldi</option>
              <option value="excused" {% if attendance.status == 'excused' %}selected{% endif %}>Uzrli</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Fan</label>
            <select name="subject" class="form-select">
              <option value="">— Fan tanlanmagan —</option>
              {% for s in subjects %}
              <option value="{{ s.pk }}" {% if attendance.subject_id == s.pk %}selected{% endif %}>{{ s.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Izoh</label>
            <input type="text" name="note" class="form-control" value="{{ attendance.note }}">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="fa-solid fa-save me-1"></i>Saqlash
            </button>
            <a href="{% url 'students_detail' attendance.student.pk %}" class="btn btn-secondary">Bekor</a>
            <a href="{% url 'students_attendance_delete' attendance.pk %}"
               class="btn btn-danger ms-auto"
               onclick="return confirm('O\'chirishni tasdiqlaysizmi?')">
              <i class="fa-solid fa-trash me-1"></i>O'chirish
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
