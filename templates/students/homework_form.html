{% extends 'base.html' %}

{% block content %}
<h1 style="font-size:28px;margin-bottom:24px;">➕ Yangi uy vazifa</h1>

<div class="card" style="max-width:800px;background:#fffdf7;border:1px solid #e2d9cf;border-radius:16px;padding:24px;">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Sinf <span style="color:#dc3545;">*</span></label>
        <select name="classroom" class="form-control" required>
          <option value="">— Tanlang —</option>
          {% for c in classrooms %}
          <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Fan <span style="color:#dc3545;">*</span></label>
        <select name="subject" class="form-control" required>
          <option value="">— Tanlang —</option>
          {% for s in subjects %}
          <option value="{{ s.id }}">{{ s.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Mavzu <span style="color:#dc3545;">*</span></label>
      <input type="text" name="title" class="form-control" required>
    </div>

    <div class="form-group">
      <label>Tavsif</label>
      <textarea name="description" class="form-control" rows="4"></textarea>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Deadline <span style="color:#dc3545;">*</span></label>
        <input type="date" name="due_date" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Fayl (ixtiyoriy)</label>
        <input type="file" name="file" class="form-control">
      </div>
    </div>

    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Saqlash</button>
    <a href="{% url 'students_homework_list' %}" class="btn" style="margin-left:8px;">Bekor qilish</a>
  </form>
</div>
{% endblock %}
