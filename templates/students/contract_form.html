{% extends 'base.html' %}

{% block content %}
<h1 style="font-size:28px;margin-bottom:24px;">📄 Yangi shartnoma — {{ student.full_name }}</h1>

<div class="card" style="max-width:800px;background:#fffdf7;border:1px solid #e2d9cf;border-radius:16px;padding:24px;">
  <form method="post">
    {% csrf_token %}
    
    <div class="form-group">
      <label>Shartnoma raqami <span style="color:#dc3545;">*</span></label>
      <input type="text" name="contract_number" class="form-control" placeholder="SH-2025-1001" required>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Boshlanish sanasi <span style="color:#dc3545;">*</span></label>
        <input type="date" name="start_date" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Tugash sanasi</label>
        <input type="date" name="end_date" class="form-control">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Oylik to'lov <span style="color:#dc3545;">*</span></label>
        <input type="number" name="monthly_fee" class="form-control" step="10000" placeholder="1500000" required>
      </div>
      <div class="form-group">
        <label>Chegirma (%)</label>
        <input type="number" name="discount_percent" class="form-control" step="0.01" min="0" max="100" value="0">
      </div>
    </div>

    <div class="form-group">
      <label>Chegirma sababi</label>
      <input type="text" name="discount_reason" class="form-control" placeholder="Ikkinchi farzand, Imtiyozli...">
    </div>

    <div class="form-group">
      <label>Eslatmalar</label>
      <textarea name="notes" class="form-control" rows="3"></textarea>
    </div>

    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Yaratish</button>
    <a href="{% url 'students_finance' student.pk %}" class="btn" style="margin-left:8px;">Bekor qilish</a>
  </form>
</div>
{% endblock %}
