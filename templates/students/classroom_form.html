{% extends 'base.html' %}

{% block content %}
<h1 style="font-size:28px;margin-bottom:24px;">➕ Yangi sinf yaratish</h1>

<div class="card" style="max-width:700px;background:#fffdf7;border:1px solid #e2d9cf;border-radius:16px;padding:24px;">
  <form method="post">
    {% csrf_token %}
    
    <div class="form-group">
      <label>Sinf nomi <span style="color:#dc3545;">*</span></label>
      <input type="text" name="name" class="form-control" placeholder="1-A, 5-B..." required>
      <small style="color:#666;">Masalan: 1-A, 5-B, 9-V</small>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Daraja <span style="color:#dc3545;">*</span></label>
        <select name="grade" class="form-control" required>
          <option value="">— Tanlang —</option>
          {% for g in grades %}
          <option value="{{ g.id }}">{{ g.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>O'quv yili <span style="color:#dc3545;">*</span></label>
        <select name="academic_year" class="form-control" required>
          <option value="">— Tanlang —</option>
          {% for y in academic_years %}
          <option value="{{ y.id }}" {% if y.is_current %}selected{% endif %}>{{ y.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Sinf rahbari</label>
        <select name="homeroom_teacher" class="form-control">
          <option value="">— Tanlang —</option>
          {% for t in teachers %}
          <option value="{{ t.id }}">{{ t.username }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Sig'im <span style="color:#dc3545;">*</span></label>
        <input type="number" name="capacity" class="form-control" value="30" min="1" max="50" required>
      </div>
    </div>

    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Yaratish</button>
    <a href="{% url 'students_classroom_list' %}" class="btn" style="margin-left:8px;">Bekor qilish</a>
  </form>
</div>
{% endblock %}
