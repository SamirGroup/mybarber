{% extends 'base.html' %}

{% block content %}
<h1 style="font-size:28px;margin-bottom:24px;">➕ Yangi chat guruh yaratish</h1>

<div class="card" style="max-width:800px;background:#fffdf7;border:1px solid #e2d9cf;border-radius:16px;padding:24px;">
  <form method="post">
    {% csrf_token %}
    
    <div class="form-group">
      <label>Guruh nomi <span style="color:#dc3545;">*</span></label>
      <input type="text" name="name" class="form-control" placeholder="5-A sinf guruhi" required>
    </div>

    <div class="form-group">
      <label>Sinf (ixtiyoriy)</label>
      <select name="classroom" class="form-control">
        <option value="">— Tanlang —</option>
        {% for c in classrooms %}
        <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
      </select>
      <small style="color:#666;">Agar sinfni tanlasangiz, barcha o'quvchilar avtomatik qo'shiladi</small>
    </div>

    <div class="form-group">
      <label>O'quvchilar</label>
      <select name="students" class="form-control" multiple size="10">
        {% for s in students %}
        <option value="{{ s.id }}">{{ s.full_name }} — {{ s.classroom|default:"Sinfsiz" }}</option>
        {% endfor %}
      </select>
      <small style="color:#666;">Ctrl tugmasini bosib bir nechta o'quvchini tanlang</small>
    </div>

    <div class="form-group">
      <label>O'qituvchilar</label>
      <select name="members" class="form-control" multiple size="5">
        {% for m in members %}
        <option value="{{ m.id }}">{{ m.username }}</option>
        {% endfor %}
      </select>
      <small style="color:#666;">Ctrl tugmasini bosib bir nechta o'qituvchini tanlang</small>
    </div>

    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Yaratish</button>
    <a href="{% url 'students_chat_list' %}" class="btn" style="margin-left:8px;">Bekor qilish</a>
  </form>
</div>
{% endblock %}
